services:
  db:
    image: mysql:8.0
    container_name: video_chat_db
    restart: always
    environment:
      MYSQL_DATABASE: ai_video_chat
      MYSQL_ROOT_PASSWORD: root_secret_password
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p", "root_secret_password"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: video_chat_redis
    restart: always
    networks:
      - app_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: video_chat_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ai_video_chat
      DB_USERNAME: root
      DB_PASSWORD: root_secret_password
      AI_SERVER_URL: http://ai:8000
    volumes:
      - ./backend:/var/www
    networks:
      - app_network

  ai:
    build:
      context: ./ai
      dockerfile: Dockerfile
    container_name: video_chat_ai
    restart: always
    env_file:
      - .env
    networks:
      - app_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: video_chat_frontend
    restart: always
    ports:
      - "3000:3000"
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    container_name: video_chat_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./backend:/var/www:ro
    depends_on:
      - backend
      - ai
      - frontend
    networks:
      - app_network

volumes:
  mysql_data:

networks:
  app_network:
    driver: bridge
